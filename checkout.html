<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Checkout — Bangali Sweets</title>
  <meta name="description" content="Secure checkout · phone OTP signup · UPI payment."/>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/site.css"/>
  <style>
    .ck-wrap { max-width: 1180px; margin: 0 auto; padding: 32px 32px 80px; }
    .ck-grid { display: grid; grid-template-columns: 1fr 380px; gap: 36px; align-items: start; }

    /* Stepper */
    .stepper-bar {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      counter-reset: step;
    }
    .stepper-bar .st {
      flex: 1;
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--ink-3);
      position: relative;
    }
    .stepper-bar .st::before {
      counter-increment: step;
      content: counter(step);
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg-sub);
      color: var(--ink-3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      flex: 0 0 28px;
    }
    .stepper-bar .st.done::before { content: "✓"; background: var(--ok); color: #fff; }
    .stepper-bar .st.curr::before { background: var(--accent); color: #fff; }
    .stepper-bar .st.curr { color: var(--ink); font-weight: 600; }
    .stepper-bar .st .lbl { white-space: nowrap; }
    .stepper-bar .st + .st::after {
      content: "";
      position: absolute;
      left: -50%; right: 60%;
      top: 14px;
      border-top: 1px dashed var(--rule-strong);
    }

    .step-card {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 32px;
    }
    .step-card h2 { font-family: var(--display); font-size: clamp(28px, 4vw, 38px); margin: 0 0 6px; line-height: 1.05; }
    .step-card h2 .alt { font-style: italic; color: var(--accent); }
    .step-card .lede { color: var(--ink-3); font-size: 14px; margin-bottom: 24px; }
    .step-card .lede.hindi { font-family: var(--hindi); font-size: 15px; color: var(--ink-2); }

    /* OTP */
    .otp-row {
      display: flex; gap: 12px;
      max-width: 360px;
    }
    .otp-row input {
      flex: 1;
      width: 56px; height: 64px;
      text-align: center;
      font-family: var(--display);
      font-size: 26px;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      background: var(--paper);
    }
    .otp-row input:focus {
      outline: none;
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 4%, var(--paper));
    }
    .resend { margin-top: 18px; font-size: 13px; color: var(--ink-3); }
    .resend a { color: var(--accent); font-weight: 600; cursor: pointer; }

    /* Phone field */
    .phone-field {
      display: flex; max-width: 420px;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--paper);
    }
    .phone-field:focus-within { border-color: var(--accent); }
    .phone-field .cc { padding: 14px 12px; border-right: 1px solid var(--rule); font-weight: 600; }
    .phone-field input { border: 0; padding: 14px 16px; flex: 1; font-size: 16px; outline: none; background: transparent; }

    /* Mode tabs */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 22px;
    }
    .mode-tabs label {
      cursor: pointer;
      padding: 16px 14px;
      border: 1.5px solid var(--rule);
      border-radius: var(--radius);
      background: var(--paper);
      text-align: left;
      transition: border-color .12s, background .12s;
    }
    .mode-tabs label.sel {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 4%, var(--paper));
    }
    .mode-tabs label input { display: none; }
    .mode-tabs .ic { font-size: 20px; }
    .mode-tabs .tt { font-weight: 600; margin-top: 2px; }
    .mode-tabs .sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

    /* Payment options */
    .pay-list { display: flex; flex-direction: column; gap: 10px; }
    .pay-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      border: 1.5px solid var(--rule);
      border-radius: var(--radius);
      background: var(--paper);
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .pay-row.sel {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 4%, var(--paper));
    }
    .pay-row .logo {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      background: var(--bg-sub);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      flex: 0 0 auto;
    }
    .pay-row .nm { font-weight: 600; font-size: 14px; }
    .pay-row .vpa { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
    .pay-row .tick {
      margin-left: auto;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--rule-strong);
    }
    .pay-row.sel .tick {
      background: var(--accent);
      border-color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 14px;
    }
    .pay-row.sel .tick::after { content: "✓"; }

    /* Success */
    .success-card {
      text-align: center;
      padding: 48px 32px;
    }
    .success-card .check {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--ok) 14%, transparent);
      color: var(--ok);
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
    }
    .success-card h2 { font-size: clamp(32px, 5vw, 48px); }
    .success-card .order-id {
      font-family: var(--display);
      font-size: 24px;
      letter-spacing: .04em;
      margin: 24px 0;
    }
    .success-card .meta-rows {
      max-width: 380px; margin: 24px auto;
      text-align: left;
      padding: 18px 22px;
      background: var(--bg-sub);
      border-radius: var(--radius-lg);
    }
    .success-card .meta-rows .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }

    /* Summary aside */
    .summary {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 22px;
      position: sticky;
      top: calc(var(--header-h) + 16px);
    }
    .summary h3 { font-family: var(--display); font-size: 20px; margin: 0 0 16px; }
    .summary .items { max-height: 280px; overflow: auto; margin-bottom: 14px; }
    .summary .it {
      display: grid; grid-template-columns: 48px 1fr auto;
      gap: 12px; padding: 8px 0; align-items: center;
      border-bottom: 1px solid var(--rule);
    }
    .summary .it:last-child { border-bottom: none; }
    .summary .it img { width: 48px; height: 48px; object-fit: cover; border-radius: var(--radius); }
    .summary .it .n { font-size: 13px; font-weight: 600; line-height: 1.2; }
    .summary .it .m { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .summary .it .p { font-size: 13px; font-weight: 600; }
    .summary .ln { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
    .summary .ln.total {
      border-top: 1px dashed var(--rule-strong);
      margin-top: 8px;
      padding-top: 12px;
      font-family: var(--display);
      font-size: 22px;
    }

    .field-block { margin-bottom: 14px; }
    .cta-row { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
    .cta-row .btn { flex: 1; min-width: 200px; justify-content: center; }
    .cta-row .back { flex: 0 0 auto; }

    @media (max-width: 880px) {
      .ck-grid { grid-template-columns: 1fr; }
      .summary { position: static; }
      .stepper-bar .st .lbl { display: none; }
    }
    @media (max-width: 540px) {
      .ck-wrap { padding: 16px 16px 60px; }
      .step-card { padding: 20px; }
      .otp-row input { width: 44px; height: 56px; font-size: 22px; }
      .mode-tabs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div class="ck-wrap">
      <nav class="crumb">
        <a href="index.html">Home</a>
        <span class="sep">›</span>
        <a href="cart.html">Bag</a>
        <span class="sep">›</span>
        <span class="curr">Checkout</span>
      </nav>

      <div class="ck-grid">
        <div>
          <div class="stepper-bar" id="stepper">
            <div class="st"><span class="lbl">Sign in</span></div>
            <div class="st"><span class="lbl">Verify OTP</span></div>
            <div class="st"><span class="lbl">Your name</span></div>
            <div class="st"><span class="lbl">Delivery</span></div>
            <div class="st"><span class="lbl">Payment</span></div>
          </div>

          <div id="step-content"></div>
        </div>

        <aside class="summary" id="summary"></aside>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>
  <script>
    BB_APP.mount();

    const state = {
      step: 0,                      // 0..5 (5 = success)
      phone: "",
      otpSent: null,
      otpResendIn: 30,
      name: "",
      email: "",
      mode: "delivery",
      address: "",
      pin: "",
      landmark: "",
      payment: "phonepe",
      orderId: null,
      total: 0,
    };

    const auth = BB_APP.auth.read();
    if (auth) {
      state.phone = auth.phone || "";
      state.name = auth.name || "";
      // skip to step 3 (delivery) if already signed in
      if (state.phone && state.name) state.step = 3;
    }

    // Redirect to cart if empty
    if (BB_APP.cart.count() === 0) {
      location.href = "cart.html";
    }

    function calcTotals() {
      const cart = BB_APP.cart.read();
      const items = cart.map(c => ({ ...BB_APP.find.product(c.id), qty: c.qty })).filter(i => i.id);
      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const delivery = state.mode === "pickup" ? 0 : (subtotal >= 999 ? 0 : 89);
      const total = subtotal + delivery;
      return { items, subtotal, delivery, total };
    }

    function renderStepper() {
      const sts = document.getElementById("stepper").children;
      for (let i = 0; i < sts.length; i++) {
        sts[i].classList.remove("done","curr");
        if (i < state.step) sts[i].classList.add("done");
        if (i === state.step) sts[i].classList.add("curr");
      }
    }

    function renderSummary() {
      const t = calcTotals();
      state.total = t.total;
      document.getElementById("summary").innerHTML = `
        <h3>Your order · ${t.items.length} item${t.items.length !== 1 ? 's' : ''}</h3>
        <div class="items">
          ${t.items.map(i => `
            <div class="it">
              <img src="${i.img}" alt=""/>
              <div>
                <div class="n">${i.en}</div>
                <div class="m">${i.unit || i.pieces || ''} × ${i.qty}</div>
              </div>
              <div class="p">${BB_APP.rupee(i.price * i.qty)}</div>
            </div>
          `).join("")}
        </div>
        <div class="ln"><span>Subtotal</span><span>${BB_APP.rupee(t.subtotal)}</span></div>
        <div class="ln"><span>Delivery${state.mode==="pickup" ? ' (pickup)' : ''}</span><span>${t.delivery === 0 ? 'FREE' : BB_APP.rupee(t.delivery)}</span></div>
        <div class="ln total"><span>Total</span><span>${BB_APP.rupee(t.total)}</span></div>
        <div style="text-align: center; font-size: 11px; color: var(--ink-3); margin-top: 14px;">
          🔒 Razorpay secure · 256-bit encryption
        </div>
      `;
    }

    function render() {
      renderStepper();
      renderSummary();
      const root = document.getElementById("step-content");

      switch (state.step) {
        case 0:
          root.innerHTML = `
            <div class="step-card">
              <div class="eyebrow">Step 1 of 5 · Sign in</div>
              <h2>Almost there, <span class="alt">tell us your phone.</span></h2>
              <p class="lede hindi">फ़ोन नंबर डालिए, OTP भेज देंगे</p>
              <label class="label" for="phone">Mobile number</label>
              <div class="phone-field">
                <span class="cc">+91</span>
                <input id="phone" type="tel" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" placeholder="98765 43210" value="${state.phone}"/>
              </div>
              <p style="font-size: 12px; color: var(--ink-3); margin: 10px 0 0;">We'll send a 6-digit OTP. No password. By continuing you agree to our <a href="#" style="color: var(--accent); display: inline">Terms</a>.</p>
              <label style="display: flex; align-items: center; gap: 10px; margin-top: 18px; font-size: 13px; color: var(--ink-2);">
                <input type="checkbox" checked/> WhatsApp me order updates
              </label>
              <div class="cta-row">
                <a class="btn btn-ghost back" href="cart.html">← Back to bag</a>
                <button class="btn btn-lg" onclick="sendOtp()">Send OTP →</button>
              </div>
            </div>
          `;
          document.getElementById("phone").focus();
          break;

        case 1:
          root.innerHTML = `
            <div class="step-card">
              <div class="eyebrow">Step 2 of 5 · Verify</div>
              <h2>Six digits, <span class="alt">please.</span></h2>
              <p class="lede">OTP sent to <strong style="color: var(--ink)">+91 ${state.phone}</strong> <a href="javascript:void(0)" onclick="state.step=0; render()" style="color: var(--accent); margin-left: 10px; font-weight: 600">Edit number</a></p>
              <div class="otp-row" id="otp-row">
                ${[0,1,2,3,4,5].map(i => `<input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" data-i="${i}"/>`).join("")}
              </div>
              <p style="font-size: 12px; color: var(--ink-3); margin: 14px 0 0;">
                💡 For this prototype, enter <strong>any 6 digits</strong> (real wiring goes to MSG91/Twilio).
              </p>
              <p class="resend">
                Resend OTP in <strong id="timer">00:${String(state.otpResendIn).padStart(2,'0')}</strong>
              </p>
              <div style="margin-top: 14px; padding: 10px 14px; background: var(--bg-sub); border-radius: var(--radius); font-size: 12px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 16px;">💬</span>
                <span>OTP also sent on WhatsApp · check your messages</span>
              </div>
              <div class="cta-row">
                <button class="btn btn-ghost back" onclick="state.step=0; render()">← Back</button>
                <button class="btn btn-lg" id="verify-btn" onclick="verifyOtp()" disabled style="opacity:.5; pointer-events:none;">Verify →</button>
              </div>
            </div>
          `;
          setupOtpInputs();
          startTimer();
          break;

        case 2:
          root.innerHTML = `
            <div class="step-card">
              <div class="eyebrow">Step 3 of 5 · About you</div>
              <h2>Who do we <span class="alt">send it to?</span></h2>
              <p class="lede hindi">नाम बताइए, हम चुटकी में पैक कर देंगे</p>
              <div class="field-block">
                <label class="label" for="nm">Full name</label>
                <input class="input" id="nm" value="${state.name}" placeholder="Anjali Verma" autofocus/>
              </div>
              <div class="field-block">
                <label class="label" for="em">Email <span style="text-transform: none; color: var(--ink-3); letter-spacing: 0">(for invoice — optional)</span></label>
                <input class="input" id="em" type="email" value="${state.email}" placeholder="anjali@email.com"/>
              </div>
              <div style="display: flex; gap: 14px; align-items: center; padding: 14px 16px; background: var(--bg-sub); border-radius: var(--radius); margin-top: 18px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--gold); color: var(--gold-ink); display: flex; align-items: center; justify-content: center; font-size: 18px; flex: 0 0 auto;">★</div>
                <div style="flex: 1;">
                  <div style="font-weight: 700; font-size: 14px;">Mithai Points</div>
                  <div style="font-size: 12px; color: var(--ink-3); margin-top: 2px;">2% back on every order · auto-enrolled</div>
                </div>
              </div>
              <div class="cta-row">
                <button class="btn btn-ghost back" onclick="state.step=1; render()">← Back</button>
                <button class="btn btn-lg" onclick="saveName()">Continue to delivery →</button>
              </div>
            </div>
          `;
          break;

        case 3:
          root.innerHTML = `
            <div class="step-card">
              <div class="eyebrow">Step 4 of 5 · Delivery</div>
              <h2>How should we <span class="alt">send it?</span></h2>
              <p class="lede">Pick a delivery option below.</p>
              <div class="mode-tabs" id="modes">
                ${[
                  ["delivery", "🚚", "Delivery", "Bhind same-day · ₹89 below ₹999"],
                  ["pickup",   "🏬", "Pickup",   "From outlet · FREE"],
                  ["ship",     "📦", "Ship",     "Pan-India · 3–5 days"],
                ].map(([m, ic, t, sub]) => `
                  <label class="${state.mode === m ? 'sel' : ''}" data-mode="${m}">
                    <input type="radio" name="mode" ${state.mode === m ? 'checked' : ''}/>
                    <div class="ic">${ic}</div>
                    <div class="tt">${t}</div>
                    <div class="sub">${sub}</div>
                  </label>
                `).join("")}
              </div>

              ${state.mode === "pickup" ? `
                <div style="padding: 18px; background: var(--bg-sub); border-radius: var(--radius); margin-bottom: 14px;">
                  <strong>Pickup from outlet</strong>
                  <div style="font-size: 13px; color: var(--ink-2); margin-top: 6px;">
                    ${BB.shop.address}<br/>
                    Open 9 AM – 10 PM · we'll WhatsApp you when ready (usually within 30 min).
                  </div>
                </div>
              ` : `
                <div class="field-block">
                  <label class="label" for="ad">Delivery address</label>
                  <textarea class="input" id="ad" rows="3" placeholder="Flat / building / area / city">${state.address}</textarea>
                </div>
                <div class="field-row cols-2 field-block">
                  <div>
                    <label class="label" for="pn">PIN code</label>
                    <input class="input" id="pn" type="text" inputmode="numeric" maxlength="6" value="${state.pin}" placeholder="477001"/>
                  </div>
                  <div>
                    <label class="label" for="lm">Landmark (optional)</label>
                    <input class="input" id="lm" value="${state.landmark}" placeholder="Near Pustak Bazar"/>
                  </div>
                </div>
                <div style="padding: 10px 14px; background: color-mix(in srgb, var(--ok) 12%, transparent); color: var(--ok); border-radius: var(--radius); font-size: 12px; margin-top: 8px;">
                  ✓ ${state.mode === "delivery" ? "Free same-day delivery available · before 4 PM today" : "Pan-India shipping available · 3–5 days · sealed packaging"}
                </div>
                <label style="display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 13px; color: var(--ink-2);">
                  <input type="checkbox" checked/> Save this address for next time
                </label>
              `}

              <div class="cta-row">
                <button class="btn btn-ghost back" onclick="state.step=2; render()">← Back</button>
                <button class="btn btn-lg" onclick="saveDelivery()">Continue to payment →</button>
              </div>
            </div>
          `;
          document.querySelectorAll("#modes label").forEach(el => {
            el.addEventListener("click", () => {
              state.mode = el.dataset.mode;
              render();
            });
          });
          break;

        case 4:
          renderSummary();
          root.innerHTML = `
            <div class="step-card">
              <div class="eyebrow">Step 5 of 5 · Payment</div>
              <h2>Pay securely <span class="alt">via UPI.</span></h2>
              <p class="lede">Razorpay-secured · we never store your VPA or card.</p>

              <div style="padding: 16px 18px; background: var(--ink); color: #fbf7ee; border-radius: var(--radius); margin-bottom: 18px;">
                <div style="font-size: 11px; opacity: .7; text-transform: uppercase; letter-spacing: .15em;">Amount payable</div>
                <div style="font-family: var(--display); font-size: 32px; margin-top: 4px;">${BB_APP.rupee(state.total)}</div>
                <div style="font-size: 12px; opacity: .75; margin-top: 4px;">${BB_APP.cart.count()} items · ${state.mode === "pickup" ? "Pickup from outlet" : `Deliver to ${state.pin || 'your address'}`}</div>
              </div>

              <div class="eyebrow" style="margin-bottom: 12px;">Pay using UPI</div>
              <div class="pay-list">
                ${[
                  ["phonepe", "PhonePe", "phonepe@ybl"],
                  ["gpay",    "Google Pay", "yourname@oksbi"],
                  ["paytm",   "Paytm",   "9876543210@paytm"],
                ].map(([k, n, vpa]) => `
                  <div class="pay-row ${state.payment === k ? 'sel' : ''}" data-pay="${k}">
                    <div class="logo">UPI</div>
                    <div>
                      <div class="nm">${n}</div>
                      <div class="vpa">${vpa}</div>
                    </div>
                    <div class="tick"></div>
                  </div>
                `).join("")}
                <div class="pay-row ${state.payment === 'qr' ? 'sel' : ''}" data-pay="qr">
                  <div class="logo" style="background: var(--ink); color: var(--gold)">QR</div>
                  <div><div class="nm">Scan UPI QR</div><div class="vpa">Open any UPI app</div></div>
                  <div class="tick"></div>
                </div>
                <div class="pay-row ${state.payment === 'cod' ? 'sel' : ''}" data-pay="cod">
                  <div class="logo" style="background: var(--gold); color: var(--gold-ink)">₹</div>
                  <div><div class="nm">Cash on Delivery</div><div class="vpa">Available in Bhind only</div></div>
                  <div class="tick"></div>
                </div>
              </div>

              <div class="cta-row">
                <button class="btn btn-ghost back" onclick="state.step=3; render()">← Back</button>
                <button class="btn btn-lg" onclick="placeOrder()">Pay ${BB_APP.rupee(state.total)} →</button>
              </div>
              <div style="text-align: center; font-size: 11px; color: var(--ink-3); margin-top: 14px;">
                🔒 Razorpay secure · 256-bit encryption · PCI DSS compliant
              </div>
            </div>
          `;
          document.querySelectorAll(".pay-row").forEach(el => {
            el.addEventListener("click", () => {
              state.payment = el.dataset.pay;
              render();
            });
          });
          break;

        case 5:
          root.innerHTML = `
            <div class="step-card success-card">
              <div class="check">✓</div>
              <div class="eyebrow" style="color: var(--ok)">Order confirmed</div>
              <h2>Mithai on its <span class="alt">way!</span></h2>
              <p class="lede hindi" style="color: var(--accent); font-size: 16px;">मिठाई पैक हो रही है ✨</p>
              <div class="order-id">${state.orderId}</div>
              <div class="meta-rows">
                <div class="row"><span>Total paid</span><strong>${BB_APP.rupee(state.total)}</strong></div>
                <div class="row"><span>Delivery by</span><strong>${state.mode === 'ship' ? 'Tue, 19 May' : 'Today · 6 PM'}</strong></div>
                <div class="row"><span>Mithai Points</span><strong style="color: var(--gold)">+${Math.floor(state.total * 0.02)} pts</strong></div>
                <div class="row"><span>WhatsApp updates</span><strong>+91 ${state.phone}</strong></div>
              </div>
              <div style="display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap;">
                <a class="btn" href="track.html?id=${state.orderId}">Track order →</a>
                <a class="btn btn-ghost" href="index.html">Continue shopping</a>
              </div>
            </div>
          `;
          // hide summary on success
          document.getElementById("summary").style.display = "none";
          break;
      }
    }

    function sendOtp() {
      const v = document.getElementById("phone").value.replace(/\D/g, "");
      if (v.length !== 10) {
        BB_APP.toast("Please enter a valid 10-digit phone number");
        return;
      }
      state.phone = v;
      state.otpResendIn = 30;
      state.step = 1;
      render();
    }

    function setupOtpInputs() {
      const inputs = document.querySelectorAll("#otp-row input");
      const verifyBtn = document.getElementById("verify-btn");
      function checkComplete() {
        const all = [...inputs].every(i => i.value.length === 1);
        verifyBtn.disabled = !all;
        verifyBtn.style.opacity = all ? "1" : ".5";
        verifyBtn.style.pointerEvents = all ? "auto" : "none";
      }
      inputs.forEach((inp, i) => {
        inp.addEventListener("input", () => {
          inp.value = inp.value.replace(/\D/g,'').slice(0,1);
          if (inp.value && i < 5) inputs[i+1].focus();
          checkComplete();
        });
        inp.addEventListener("keydown", e => {
          if (e.key === "Backspace" && !inp.value && i > 0) inputs[i-1].focus();
        });
        inp.addEventListener("paste", e => {
          const data = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g,'').slice(0,6);
          if (data.length === 6) {
            e.preventDefault();
            inputs.forEach((x, j) => x.value = data[j] || "");
            inputs[5].focus();
            checkComplete();
          }
        });
      });
      inputs[0].focus();
    }

    function startTimer() {
      let s = state.otpResendIn;
      const el = document.getElementById("timer");
      const tick = () => {
        s = Math.max(0, s - 1);
        if (el) el.textContent = `00:${String(s).padStart(2,'0')}`;
        if (s > 0 && state.step === 1) setTimeout(tick, 1000);
        else if (el) el.outerHTML = `<a onclick="state.otpResendIn=30; startTimer()">Resend OTP</a>`;
      };
      setTimeout(tick, 1000);
    }
    window.startTimer = startTimer;

    function verifyOtp() {
      const v = [...document.querySelectorAll("#otp-row input")].map(i => i.value).join("");
      if (v.length !== 6) return;
      // mock-accept any 6-digit OTP
      state.step = state.name ? 3 : 2;
      render();
    }

    function saveName() {
      const nm = document.getElementById("nm").value.trim();
      if (!nm) { BB_APP.toast("Please enter your name"); return; }
      state.name = nm;
      state.email = document.getElementById("em").value.trim();
      BB_APP.auth.login(state.phone, state.name);
      state.step = 3;
      render();
    }

    function saveDelivery() {
      if (state.mode !== "pickup") {
        const ad = document.getElementById("ad").value.trim();
        const pn = document.getElementById("pn").value.trim();
        if (!ad) { BB_APP.toast("Please enter your address"); return; }
        if (!/^\d{6}$/.test(pn)) { BB_APP.toast("Please enter a valid 6-digit PIN"); return; }
        state.address = ad;
        state.pin = pn;
        state.landmark = document.getElementById("lm").value.trim();
      }
      state.step = 4;
      render();
    }

    function placeOrder() {
      const order = BB_APP.orders.place({
        phone: state.phone,
        name: state.name,
        email: state.email,
        mode: state.mode,
        address: state.mode === "pickup" ? BB.shop.address : state.address,
        pin: state.pin,
        landmark: state.landmark,
        payment: state.payment,
        total: state.total,
      });
      state.orderId = order.id;
      state.step = 5;
      render();
      BB_APP.toast("Order placed! 🎉");
    }

    window.sendOtp = sendOtp;
    window.verifyOtp = verifyOtp;
    window.saveName = saveName;
    window.saveDelivery = saveDelivery;
    window.placeOrder = placeOrder;
    window.state = state;
    window.render = render;

    render();
  </script>
</body>
</html>
