<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title id="page-title">Product — Bangali Sweets</title>
  <meta id="page-desc" name="description" content="Order online from Bangali Sweets, Bhind."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/site.css"/>
  <style>
    .pd-wrap { max-width: 1320px; margin: 0 auto; padding: 0 32px; }
    .pd-top { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; padding: 24px 0 56px; }

    .gallery .main {
      aspect-ratio: 1/1;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg-sub);
      margin-bottom: 14px;
      position: relative;
    }
    .gallery .main img { width: 100%; height: 100%; object-fit: cover; }
    .gallery .thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .gallery .thumb {
      aspect-ratio: 1/1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-sub);
      cursor: pointer;
      border: 2px solid transparent;
    }
    .gallery .thumb.active { border-color: var(--accent); }
    .gallery .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .info .hi { font-family: var(--hindi); font-size: 18px; color: var(--accent); margin-bottom: 4px; }
    .info h1 { font-family: var(--display); font-size: clamp(36px, 5vw, 56px); line-height: 1; margin: 0 0 12px; font-weight: 500; }
    .info .meta { display: flex; gap: 16px; align-items: center; margin-bottom: 18px; color: var(--ink-3); font-size: 13px; }
    .info .meta .stars { color: var(--gold); }
    .info .desc { font-size: 15px; line-height: 1.7; color: var(--ink-2); margin-bottom: 24px; }

    .price-block {
      padding: 22px 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      margin-bottom: 20px;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .price-block .now { font-family: var(--display); font-size: 40px; line-height: 1; }
    .price-block .mrp { font-size: 16px; color: var(--ink-3); text-decoration: line-through; }
    .price-block .off { font-size: 12px; font-weight: 700; color: var(--ok); background: color-mix(in srgb, var(--ok) 14%, transparent); padding: 4px 10px; border-radius: 99px; }
    .price-block .unit { margin-left: auto; font-size: 13px; color: var(--ink-3); }

    .qty-row { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; }
    .qty-stepper {
      display: flex; align-items: center;
      border: 1px solid var(--rule-strong);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .qty-stepper button {
      width: 44px; height: 44px;
      font-size: 18px;
      background: var(--paper);
    }
    .qty-stepper button:hover { background: var(--bg-sub); }
    .qty-stepper .v {
      width: 44px; text-align: center;
      font-weight: 600;
    }

    .actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .actions .btn { flex: 1; min-width: 180px; }
    .actions .wishlist {
      width: 48px; height: 48px;
      border: 1px solid var(--rule-strong);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-2);
    }
    .actions .wishlist:hover { color: var(--accent); border-color: var(--accent); }

    .perks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .perk {
      display: flex; gap: 12px; align-items: center;
      padding: 12px 14px;
      background: var(--bg-sub);
      border-radius: var(--radius);
      font-size: 12px;
    }
    .perk .ico-box {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
    }

    /* PIN check */
    .pin-check {
      padding: 16px;
      border: 1px dashed var(--rule-strong);
      border-radius: var(--radius);
      margin-bottom: 24px;
    }
    .pin-check .lbl-line { font-size: 12px; color: var(--ink-3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; }
    .pin-check .row { display: flex; gap: 8px; }
    .pin-check input { flex: 1; padding: 10px 12px; border: 1px solid var(--rule); border-radius: var(--radius); }
    .pin-check button { padding: 10px 18px; }
    .pin-check .ok-msg { color: var(--ok); font-size: 12px; margin-top: 10px; display: none; }

    /* Details accordion */
    .details {
      border-top: 1px solid var(--rule);
      padding-top: 16px;
    }
    details {
      border-bottom: 1px solid var(--rule);
      padding: 14px 0;
    }
    details summary {
      list-style: none;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::after { content: "+"; font-size: 22px; color: var(--ink-3); }
    details[open] summary::after { content: "−"; }
    details p { color: var(--ink-2); margin: 10px 0 0; font-size: 14px; line-height: 1.65; }

    /* Related */
    .related-section { padding: 56px 0; background: var(--bg-sub); }
    .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; max-width: 1320px; margin: 0 auto; padding: 0 32px; }

    /* Tabs (reviews, ingredients etc.) */
    @media (max-width: 840px) {
      .pd-top { grid-template-columns: 1fr; gap: 32px; }
      .related-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 540px) {
      .pd-wrap { padding: 0 16px; }
      .related-section { padding: 40px 0; }
      .perks { grid-template-columns: 1fr; }
      .related-grid { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div class="pd-wrap">
      <nav class="crumb" aria-label="Breadcrumb" id="crumb">
        <a href="index.html">Home</a>
        <span class="sep">›</span>
        <a href="collections.html">Collections</a>
        <span class="sep">›</span>
        <a id="crumb-cat" href="#">Category</a>
        <span class="sep">›</span>
        <span class="curr" id="crumb-name">Product</span>
      </nav>

      <div class="pd-top" id="pd-top"></div>
    </div>

    <section class="related-section">
      <div style="max-width: 1320px; margin: 0 auto; padding: 0 32px;">
        <div class="section-head">
          <div>
            <div class="eyebrow">You may also like</div>
            <h2 class="h2 disp">From the same kitchen</h2>
          </div>
        </div>
      </div>
      <div class="related-grid" id="related"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id") || "h1";
    const p = BB_APP.find.product(id) || BB.products[0];
    const cat = BB_APP.find.category(p.cat);

    BB_APP.analytics.trackProductView(p.id);
    BB_APP.mount({ nav: p.cat });

    document.title = `${p.en} (${p.hi}) ${p.unit || p.pieces || ""} — Bangali Sweets`;
    document.getElementById("page-desc").setAttribute("content", `${p.desc.slice(0, 150)} Order online from Bangali Sweets, Bhind.`);

    document.getElementById("crumb-cat").textContent = cat.en;
    document.getElementById("crumb-cat").href = `category.html?slug=${cat.slug}`;
    document.getElementById("crumb-name").textContent = p.en;

    let qty = 1;

    function render() {
      const stars = "★".repeat(Math.round(p.rating || 4)) + "☆".repeat(5 - Math.round(p.rating || 4));
      const disc = Math.round(((p.mrp - p.price) / p.mrp) * 100);
      document.getElementById("pd-top").innerHTML = `
        <div class="gallery">
          <div class="main"><img id="main-img" src="${p.img}" alt="${p.en} ${p.unit || ''}"/></div>
          <div class="thumbs">
            ${[p.img, p.img, p.img, p.img].map((src, i) => `
              <div class="thumb ${i === 0 ? 'active' : ''}" onclick="document.getElementById('main-img').src='${src}'; document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active')); this.classList.add('active');">
                <img src="${src}" alt=""/>
              </div>
            `).join("")}
          </div>
        </div>
        <div class="info">
          <div class="hi">${p.hi}</div>
          <h1>${p.en}</h1>
          <div class="meta">
            <span class="stars">${stars}</span>
            <span>${p.rating || 4.5} · ${p.reviews || 0} reviews</span>
            ${p.stock > 0 ? `<span style="color: var(--ok); font-weight:600">● In stock</span>` : `<span style="color: var(--danger)">● Out of stock</span>`}
          </div>
          <p class="desc">${p.desc}</p>

          <div class="price-block">
            <span class="now">${BB_APP.rupee(p.price)}</span>
            <span class="mrp">₹${p.mrp}</span>
            <span class="off">${disc}% off</span>
            <span class="unit">${p.unit || p.pieces || ''}</span>
          </div>

          <div class="qty-row">
            <span class="label" style="margin: 0;">Qty</span>
            <div class="qty-stepper">
              <button onclick="qty=Math.max(1,qty-1);document.getElementById('q').textContent=qty">−</button>
              <span class="v" id="q">${qty}</span>
              <button onclick="qty+=1;document.getElementById('q').textContent=qty">+</button>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-lg" onclick="BB_APP.cart.add('${p.id}', qty)">Add to bag</button>
            <a class="btn btn-gold btn-lg" href="javascript:void(0)" onclick="BB_APP.cart.add('${p.id}', qty); setTimeout(()=>location.href='checkout.html', 400)">Buy now →</a>
            <button class="wishlist" aria-label="Add to wishlist">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 10c0 5.65-7 10-7 10Z"/></svg>
            </button>
          </div>

          <div class="perks">
            <div class="perk"><div class="ico-box">🚚</div><div><strong>Free Bhind delivery</strong><br/><span class="muted">orders above ₹999</span></div></div>
            <div class="perk"><div class="ico-box">📦</div><div><strong>Pan-India shipping</strong><br/><span class="muted">3–5 days · sealed packaging</span></div></div>
            <div class="perk"><div class="ico-box">🥛</div><div><strong>Pure desi ghee</strong><br/><span class="muted">no preservatives</span></div></div>
            <div class="perk"><div class="ico-box">↩</div><div><strong>Easy returns</strong><br/><span class="muted">refresh-on-quality promise</span></div></div>
          </div>

          <div class="pin-check">
            <div class="lbl-line">Check delivery to your area</div>
            <div class="row">
              <input id="pin" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6-digit PIN code"/>
              <button class="btn btn-sm" onclick="checkPin()">Check</button>
            </div>
            <div class="ok-msg" id="pin-ok"></div>
          </div>

          <div class="details">
            <details open>
              <summary>Ingredients</summary>
              <p>${p.ingredients || 'See packaging for details.'}</p>
            </details>
            <details>
              <summary>Shelf life &amp; storage</summary>
              <p>${p.shelf || 'Store in a cool dry place.'}</p>
            </details>
            <details>
              <summary>Allergens</summary>
              <p>Contains milk, tree nuts (cashew, almond, pistachio). Prepared in a kitchen that handles wheat, dairy, and nuts.</p>
            </details>
            <details>
              <summary>FSSAI &amp; Manufacturer</summary>
              <p>Manufactured &amp; packed by Bangali Sweets &amp; Dryfruits, Pustak Bazar, Bhind, MP 477001. FSSAI Lic. ${BB.shop.fssai}. GSTIN ${BB.shop.gstin}.</p>
            </details>
          </div>
        </div>
      `;
    }

    render();

    function checkPin() {
      const v = document.getElementById("pin").value;
      const ok = document.getElementById("pin-ok");
      if (!/^\d{6}$/.test(v)) {
        ok.style.color = "var(--danger)";
        ok.style.display = "block";
        ok.textContent = "Please enter a valid 6-digit PIN code.";
        return;
      }
      ok.style.color = "var(--ok)";
      ok.style.display = "block";
      if (v.startsWith("4770")) {
        ok.textContent = "✓ Same-day delivery available · before 4 PM today";
      } else {
        ok.textContent = "✓ Pan-India shipping available · 3–5 days · ₹89 shipping";
      }
    }

    // Related
    const related = BB.products.filter(x => x.cat === p.cat && x.id !== p.id).slice(0, 4);
    document.getElementById("related").innerHTML = related.map(r => `
      <article class="product-card">
        <a href="product.html?id=${r.id}" class="img"><img src="${r.img}" alt="${r.en}"/></a>
        <div class="body">
          <div class="hi">${r.hi}</div>
          <div class="nm"><a href="product.html?id=${r.id}">${r.en}</a></div>
          <div class="meta">${r.unit || r.pieces || ''}</div>
          <div class="row">
            <span class="price">${BB_APP.rupee(r.price)} <span class="mrp">₹${r.mrp}</span></span>
            <button class="add" onclick="BB_APP.cart.add('${r.id}')">${BB_APP.icons.plus}</button>
          </div>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
