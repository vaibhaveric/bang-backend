spring.application.name=bangali-sweets

# Database
# createDatabaseIfNotExist=true → auto-creates the `bangali_sweets` database on first connect if missing.
spring.datasource.url=jdbc:mysql://localhost:3306/bangali_sweets?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=vaibhav2
spring.datasource.password=root

#spring.datasource.url=jdbc:mysql://acela.proxy.rlwy.net:24158/bangali_sweets?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=XSmVIyQBBldlNyIrgSgOtJzGkJZvjJbP
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# ddl-auto=update → Hibernate auto-creates/updates all tables (schema) from the @Entity classes on startup.
# (Use `create` to drop & rebuild every boot, `validate` to only check; `update` is safe and preserves data.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Batch any remaining lazy/eager associations into IN-clauses (fewer round-trips to the remote DB).
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# Connection pool — the DB is remote (~150ms RTT + TLS), so keep a few connections warm
# and alive instead of re-handshaking on every request.
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1740000
# MySQL driver: cache & batch prepared statements to cut server round-trips.
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# Server
# Bind to the host-assigned port in production (Railway/Render set $PORT); default 8080 locally.
server.port=${PORT:8080}
server.servlet.context-path=/api

# JWT
app.jwt.secret=BangaliSweetsSecretKeyForJWT2024MustBeAtLeast256BitsLong!@#
app.jwt.expiration-ms=604800000
app.jwt.admin-secret=AdminBangaliSweetsSecretKey2024MustBeAtLeast256BitsLong!@#

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Uploaded product images are written into the frontend project so the static site serves them.
# Path is relative to the backend's working dir (sibling repos: Personal/bang-backend & Personal/bang-frontend).
app.upload.dir=../bang-frontend/assets/uploads

# Admin credentials (change in production)
app.admin.username=admin
app.admin.password=Sourabh@303

# CORS
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,file://

# Jackson — serialize LocalDateTime as ISO string, not array
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.in.bangalisweets=INFO
logging.level.org.springframework.security=WARN
