<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Search — Bangali Sweets</title>
  <meta name="description" content="Search products at Bangali Sweets, Bhind."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/site.css"/>
  <style>
    .sr-wrap { max-width: 1320px; margin: 0 auto; padding: 32px 32px 80px; }
    .sr-wrap h1 { font-family: var(--display); font-size: clamp(32px, 4vw, 44px); margin: 14px 0 28px; font-weight: 500; }
    .sr-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    @media (max-width: 880px) { .sr-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px) { .sr-wrap { padding: 16px 16px 64px; } .sr-grid { gap: 12px; } }
    .empty { padding: 64px 16px; text-align: center; }
    .empty .ic { font-size: 56px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <header id="site-header"></header>
  <main>
    <div class="sr-wrap">
      <nav class="crumb">
        <a href="index.html">Home</a><span class="sep">›</span><span class="curr">Search</span>
      </nav>
      <h1 id="title">Search results</h1>
      <div id="results"></div>
    </div>
  </main>
  <footer id="site-footer"></footer>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>
  <script>
    BB_APP.mount();
    const params = new URLSearchParams(location.search);
    const q = (params.get("q") || "").trim().toLowerCase();
    document.getElementById("title").innerHTML = q
      ? `Search results for "<span style="color: var(--accent); font-style: italic;">${q}</span>"`
      : `Search`;

    if (!q) {
      document.getElementById("results").innerHTML = `<div class="empty"><div class="ic">🔍</div><p class="muted">Type something into the search bar above.</p></div>`;
    } else {
      const matches = BB.products.filter(p =>
        (p.en + " " + p.hi + " " + (p.desc||"") + " " + (p.cat||"")).toLowerCase().includes(q)
      );
      if (matches.length === 0) {
        document.getElementById("results").innerHTML = `
          <div class="empty">
            <div class="ic">🤷</div>
            <h2 class="h2 disp">Nothing matched "${q}"</h2>
            <p class="muted">Try kaju, hampers, dry fruits, namkeen…</p>
            <a class="btn" href="collections.html" style="margin-top: 16px;">Browse collections →</a>
          </div>
        `;
      } else {
        document.getElementById("results").innerHTML = `
          <p class="muted" style="margin: 0 0 18px;">${matches.length} result${matches.length !== 1 ? 's' : ''}</p>
          <div class="sr-grid">
            ${matches.map(p => `
              <article class="product-card">
                <a href="product.html?id=${p.id}" class="img"><img src="${p.img}" alt="${p.en}"/></a>
                <div class="body">
                  <div class="hi">${p.hi}</div>
                  <div class="nm"><a href="product.html?id=${p.id}">${p.en}</a></div>
                  <div class="meta">${p.unit || p.pieces || ''}</div>
                  <div class="row">
                    <span class="price">${BB_APP.rupee(p.price)} <span class="mrp">₹${p.mrp}</span></span>
                    <button class="add" onclick="BB_APP.cart.add('${p.id}')">${BB_APP.icons.plus}</button>
                  </div>
                </div>
              </article>
            `).join("")}
          </div>
        `;
      }
    }
  </script>
</body>
</html>
