<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Account — Bangali Sweets</title>
  <meta name="description" content="Manage your Bangali Sweets account, orders, addresses, and Mithai Points."/>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/site.css"/>
  <style>
    .ac-wrap { max-width: 1180px; margin: 0 auto; padding: 32px 32px 80px; }
    .ac-wrap h1 { font-family: var(--display); font-size: clamp(36px, 5vw, 56px); font-weight: 500; margin: 12px 0 28px; }
    .ac-grid { display: grid; grid-template-columns: 260px 1fr; gap: 36px; align-items: start; }
    .ac-nav {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 8px;
      position: sticky;
      top: calc(var(--header-h) + 16px);
    }
    .ac-nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--ink-2);
      border-radius: var(--radius);
      cursor: pointer;
    }
    .ac-nav a:hover { background: var(--bg-sub); color: var(--ink); }
    .ac-nav a.active { background: color-mix(in srgb, var(--accent) 8%, var(--paper)); color: var(--accent); font-weight: 600; }
    .ac-nav a .ic { font-size: 16px; width: 22px; }

    /* Sign-in card */
    .signin-card {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 48px 32px;
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }
    .signin-card .seal {
      width: 56px; height: 56px;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display);
      font-style: italic;
      font-size: 26px;
      margin-bottom: 18px;
    }
    .signin-card h2 { font-family: var(--display); font-size: 32px; margin: 0 0 6px; }
    .signin-card p { color: var(--ink-3); margin: 0 0 24px; font-size: 14px; }
    .signin-card .phone-field {
      display: flex;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--paper);
      margin-bottom: 18px;
    }
    .signin-card .phone-field:focus-within { border-color: var(--accent); }
    .signin-card .phone-field .cc { padding: 14px 12px; border-right: 1px solid var(--rule); font-weight: 600; }
    .signin-card .phone-field input { border: 0; padding: 14px 16px; flex: 1; font-size: 16px; outline: none; }

    /* Profile sections */
    .ac-section {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .ac-section h2 {
      font-family: var(--display);
      font-size: 22px;
      margin: 0 0 4px;
      font-weight: 500;
    }
    .ac-section .sub { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }
    .profile-grid .field {
      padding: 12px 14px;
      background: var(--bg-sub);
      border-radius: var(--radius);
    }
    .profile-grid .field .lbl-line {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--ink-3);
      margin-bottom: 4px;
    }
    .profile-grid .field .val {
      font-weight: 600;
      font-size: 14px;
    }

    /* Order list */
    .order {
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 14px;
      align-items: center;
    }
    .order:last-child { border-bottom: none; }
    .order .img-stack {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .order .img-stack img {
      width: 100%; height: 100%; object-fit: cover;
      border-radius: var(--radius);
    }
    .order .id { font-family: ui-monospace, monospace; font-size: 13px; font-weight: 700; }
    .order .meta { font-size: 12px; color: var(--ink-3); }
    .order .status {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      display: inline-block;
      margin-top: 4px;
    }
    .order .status.packing { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
    .order .status.ofd     { background: color-mix(in srgb, var(--gold)   14%, transparent); color: var(--gold-ink); }
    .order .status.delivered { background: color-mix(in srgb, var(--ok)   14%, transparent); color: var(--ok); }
    .order .price { font-family: var(--display); font-size: 18px; }

    /* Points card */
    .points-card {
      background: linear-gradient(135deg, var(--accent), #531c1c);
      color: var(--gold);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .points-card::before {
      content: "✦";
      position: absolute;
      right: 24px; top: 14px;
      font-size: 80px;
      opacity: .15;
    }
    .points-card .lbl-line { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; opacity: .85; }
    .points-card .v { font-family: var(--display); font-size: 56px; line-height: 1; margin: 8px 0 6px; color: #fff; }
    .points-card .sub { font-size: 13px; opacity: .85; }

    @media (max-width: 880px) {
      .ac-grid { grid-template-columns: 1fr; }
      .ac-nav { position: static; display: flex; gap: 6px; overflow-x: auto; }
      .ac-nav a { white-space: nowrap; }
      .profile-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 540px) {
      .ac-wrap { padding: 16px 16px 64px; }
      .order { grid-template-columns: 1fr auto; }
      .order .img-stack { display: none; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div class="ac-wrap">
      <nav class="crumb">
        <a href="index.html">Home</a>
        <span class="sep">›</span>
        <span class="curr">My Account</span>
      </nav>
      <div id="ac-root"></div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>
  <script>
    BB_APP.mount();

    const root = document.getElementById("ac-root");

    function renderSignedOut() {
      root.innerHTML = `
        <div class="signin-card">
          <div class="seal">B</div>
          <h2 class="disp">Welcome back</h2>
          <p class="hindi" style="font-size: 14px; color: var(--accent)">अपने नंबर से लॉग इन करें</p>
          <div class="phone-field">
            <span class="cc">+91</span>
            <input id="ph" type="tel" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" placeholder="98765 43210"/>
          </div>
          <button class="btn btn-lg btn-block" onclick="signin()">Send OTP →</button>
          <p style="font-size: 12px; color: var(--ink-3); margin: 16px 0 0;">No password. Just your phone number. We'll OTP you each time.</p>
        </div>
      `;
      document.getElementById("ph").focus();
    }

    function signin() {
      const v = document.getElementById("ph").value.replace(/\D/g, "");
      if (v.length !== 10) { BB_APP.toast("Please enter a valid 10-digit phone"); return; }
      // mock OTP step: jump straight to a placeholder (we'd normally go through OTP flow)
      const name = prompt("Demo prototype — enter your name to mock-sign-in:") || "Customer";
      BB_APP.auth.login(v, name);
      render();
      BB_APP.toast("Signed in · welcome ✦");
    }
    window.signin = signin;

    function signout() {
      if (!confirm("Sign out of your account?")) return;
      BB_APP.auth.logout();
      render();
    }
    window.signout = signout;

    function renderSignedIn() {
      const auth = BB_APP.auth.read();
      const orders = BB_APP.orders.read();
      const memberSince = auth.joined ? new Date(auth.joined).toLocaleDateString("en-IN", { year: "numeric", month: "long" }) : "—";
      const totalSpend = orders.reduce((s, o) => s + (o.total || 0), 0);
      const points = Math.floor(totalSpend * 0.02);

      root.innerHTML = `
        <h1>Hello, ${auth.name || "friend"} <span class="hindi" style="font-size: 0.5em; color: var(--accent)">नमस्ते 🙏</span></h1>

        <div class="ac-grid">
          <aside class="ac-nav">
            <a class="active" href="#overview"><span class="ic">🏠</span> Overview</a>
            <a href="#orders"><span class="ic">📦</span> My orders <span style="margin-left:auto; color: var(--ink-3); font-size: 11px;">${orders.length}</span></a>
            <a href="#points"><span class="ic">✦</span> Mithai Points</a>
            <a href="#addresses"><span class="ic">📍</span> Addresses</a>
            <a href="#wishlist"><span class="ic">♡</span> Wishlist</a>
            <a href="#profile"><span class="ic">👤</span> Profile</a>
            <a onclick="signout()" style="color: var(--danger)"><span class="ic">↩</span> Sign out</a>
          </aside>

          <div>
            <!-- POINTS HERO -->
            <div class="points-card" id="points">
              <div class="lbl-line">Mithai Points balance</div>
              <div class="v">${points}</div>
              <div class="sub">2% back on every order · ₹100 off for every 200 points · valid for 1 year</div>
            </div>

            <!-- ORDERS -->
            <section class="ac-section" id="orders" style="margin-top: 20px;">
              <h2>Recent orders</h2>
              <div class="sub">${orders.length} order${orders.length !== 1 ? 's' : ''} · lifetime spend ${BB_APP.rupee(totalSpend)}</div>

              ${orders.length === 0 ? `
                <div style="text-align: center; padding: 32px 16px; color: var(--ink-3);">
                  <div style="font-size: 40px; margin-bottom: 10px;">📦</div>
                  <div>No orders yet. Time to fix that!</div>
                  <a class="btn btn-sm" href="collections.html" style="margin-top: 16px;">Browse collections</a>
                </div>
              ` : orders.slice().reverse().map(o => {
                const date = new Date(o.placedAt).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
                const firstItem = o.items[0];
                const cls = (o.status||"").toLowerCase().includes("packing") ? "packing"
                          : (o.status||"").toLowerCase().includes("delivered") ? "delivered" : "ofd";
                return `
                  <div class="order">
                    <div class="img-stack"><img src="${firstItem ? firstItem.img : ''}" alt=""/></div>
                    <div>
                      <div class="id">${o.id}</div>
                      <div class="meta">${date} · ${o.items.length} item${o.items.length !== 1 ? 's' : ''} · ${o.mode === 'pickup' ? 'Pickup' : 'Delivery'}</div>
                      <span class="status ${cls}">● ${o.status || 'Processing'}</span>
                    </div>
                    <div style="text-align: right">
                      <div class="price">${BB_APP.rupee(o.total)}</div>
                      <a href="track.html?id=${o.id}" style="font-size: 12px; color: var(--accent); font-weight: 600;">Track →</a>
                    </div>
                  </div>
                `;
              }).join("")}
            </section>

            <!-- PROFILE -->
            <section class="ac-section" id="profile">
              <h2>Profile</h2>
              <div class="sub">From your sign-in details</div>
              <div class="profile-grid">
                <div class="field">
                  <div class="lbl-line">Name</div>
                  <div class="val">${auth.name || "—"}</div>
                </div>
                <div class="field">
                  <div class="lbl-line">Phone</div>
                  <div class="val">+91 ${auth.phone}</div>
                </div>
                <div class="field">
                  <div class="lbl-line">Email</div>
                  <div class="val">${auth.email || "Not added"}</div>
                </div>
                <div class="field">
                  <div class="lbl-line">Member since</div>
                  <div class="val">${memberSince}</div>
                </div>
              </div>
              <button class="btn btn-ghost btn-sm" style="margin-top: 14px;" onclick="alert('Edit profile — wire to backend')">Edit profile</button>
            </section>

            <!-- ADDRESSES -->
            <section class="ac-section" id="addresses">
              <h2>Saved addresses</h2>
              <div class="sub">Used in your last few orders</div>
              ${orders.length > 0
                ? `<div class="profile-grid">
                    ${(() => {
                      const seen = new Set();
                      return orders.filter(o => o.address && !seen.has(o.address) && seen.add(o.address)).slice(0, 3).map(o => `
                        <div class="field">
                          <div class="lbl-line">${o.mode === 'pickup' ? 'Pickup outlet' : 'Delivery address'}</div>
                          <div class="val" style="font-size: 13px; font-weight: 500; line-height: 1.5;">${o.address}</div>
                          ${o.pin ? `<div style="font-size: 11px; color: var(--ink-3); margin-top: 4px;">PIN ${o.pin}</div>` : ''}
                        </div>
                      `).join("");
                    })()}
                  </div>`
                : `<div style="font-size: 13px; color: var(--ink-3);">Your addresses will appear here after your first order.</div>`
              }
            </section>

            <!-- WISHLIST -->
            <section class="ac-section" id="wishlist">
              <h2>Wishlist</h2>
              <div class="sub">Hearted items appear here</div>
              <div style="font-size: 13px; color: var(--ink-3); padding: 12px 0;">Browse <a href="collections.html" style="color: var(--accent); font-weight: 600; display: inline">collections</a> and tap ♡ to save favourites.</div>
            </section>
          </div>
        </div>
      `;
    }

    function render() {
      const auth = BB_APP.auth.read();
      if (auth) renderSignedIn();
      else renderSignedOut();
    }

    render();
    window.addEventListener("bb:auth", render);
  </script>
</body>
</html>
