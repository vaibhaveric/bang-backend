<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Your Bag — Bangali Sweets</title>
  <meta name="description" content="Review your bag before checkout at Bangali Sweets."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/site.css"/>
  <style>
    .cart-wrap { max-width: 1180px; margin: 0 auto; padding: 32px 32px 80px; }
    .cart-wrap h1 { font-family: var(--display); font-size: clamp(36px, 5vw, 56px); margin: 14px 0 28px; font-weight: 500; }
    .cart-grid { display: grid; grid-template-columns: 1fr 380px; gap: 36px; align-items: start; }
    .items { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius-lg); overflow: hidden; }
    .empty {
      padding: 64px 32px;
      text-align: center;
    }
    .empty .h2 { margin-bottom: 12px; }
    .empty p { color: var(--ink-3); margin-bottom: 24px; }
    .item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 20px;
      padding: 20px;
      border-bottom: 1px solid var(--rule);
      align-items: center;
    }
    .item:last-child { border-bottom: none; }
    .item .img {
      width: 100px; height: 100px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-sub);
    }
    .item .img img { width: 100%; height: 100%; object-fit: cover; }
    .item .nm { font-family: var(--display); font-size: 20px; line-height: 1.1; margin-bottom: 4px; }
    .item .hi { font-family: var(--hindi); font-size: 12px; color: var(--accent); }
    .item .meta { font-size: 12px; color: var(--ink-3); margin: 4px 0 10px; }
    .item .actions { display: flex; gap: 14px; align-items: center; }
    .item .stepper {
      display: inline-flex; align-items: center;
      border: 1px solid var(--rule-strong);
      border-radius: 99px;
      overflow: hidden;
    }
    .item .stepper button { width: 32px; height: 32px; font-size: 14px; background: var(--paper); }
    .item .stepper .v { width: 32px; text-align: center; font-weight: 600; font-size: 13px; }
    .item .remove { font-size: 12px; color: var(--ink-3); text-decoration: underline; cursor: pointer; }
    .item .remove:hover { color: var(--danger); }
    .item .price { font-family: var(--display); font-size: 22px; text-align: right; }
    .item .price .mrp { font-size: 12px; color: var(--ink-3); text-decoration: line-through; display: block; }

    .summary {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 22px;
      position: sticky;
      top: calc(var(--header-h) + 16px);
    }
    .summary h2 { font-family: var(--display); font-size: 22px; margin: 0 0 18px; }
    .summary .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
    .summary .row.total {
      border-top: 1px dashed var(--rule-strong);
      margin-top: 12px;
      padding-top: 16px;
      font-family: var(--display);
      font-size: 24px;
      font-weight: 500;
    }
    .summary .coupon {
      margin: 14px 0;
      display: flex; gap: 6px;
    }
    .summary .coupon input { flex: 1; padding: 10px 12px; border: 1px solid var(--rule); border-radius: var(--radius); font-size: 13px; }
    .summary .coupon button { padding: 10px 16px; }
    .summary .perk {
      margin-top: 14px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--gold) 14%, transparent);
      color: var(--gold-ink);
      border-radius: var(--radius);
      font-size: 12px;
    }
    .summary .perk.ok {
      background: color-mix(in srgb, var(--ok) 12%, transparent);
      color: var(--ok);
    }

    @media (max-width: 880px) {
      .cart-grid { grid-template-columns: 1fr; }
      .summary { position: static; }
    }
    @media (max-width: 540px) {
      .cart-wrap { padding: 16px 16px 64px; }
      .item { grid-template-columns: 70px 1fr; }
      .item .img { width: 70px; height: 70px; }
      .item .price { grid-column: 1 / -1; text-align: left; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div class="cart-wrap">
      <nav class="crumb">
        <a href="index.html">Home</a>
        <span class="sep">›</span>
        <span class="curr">Your bag</span>
      </nav>
      <h1>Your bag <span style="color: var(--ink-3); font-size: 0.55em" id="count">— 0 items</span></h1>

      <div id="cart-content"></div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>
  <script>
    BB_APP.mount();

    function render() {
      const cart = BB_APP.cart.read();
      const items = cart.map(c => ({ ...BB_APP.find.product(c.id), qty: c.qty })).filter(i => i.id);
      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const itemCount = items.reduce((s, i) => s + i.qty, 0);
      document.getElementById("count").textContent = `— ${itemCount} item${itemCount !== 1 ? 's' : ''}`;

      const root = document.getElementById("cart-content");

      if (items.length === 0) {
        root.innerHTML = `
          <div class="items empty">
            <div style="font-size: 56px; margin-bottom: 16px;">🛍</div>
            <h2 class="h2 disp">Your bag is empty</h2>
            <p>Time to fill it with something sweet.</p>
            <a class="btn btn-lg" href="collections.html">Browse collections</a>
          </div>
        `;
        return;
      }

      const delivery = subtotal >= 999 ? 0 : 89;
      const freeNeed = 999 - subtotal;
      const total = subtotal + delivery;

      root.innerHTML = `
        <div class="cart-grid">
          <div class="items">
            ${items.map(i => `
              <div class="item">
                <a href="product.html?id=${i.id}" class="img"><img src="${i.img}" alt="${i.en}"/></a>
                <div>
                  <div class="hi">${i.hi}</div>
                  <div class="nm"><a href="product.html?id=${i.id}">${i.en}</a></div>
                  <div class="meta">${i.unit || i.pieces || ''} · ${BB_APP.rupee(i.price)} each</div>
                  <div class="actions">
                    <div class="stepper">
                      <button onclick="BB_APP.cart.update('${i.id}', ${i.qty - 1}); render()">−</button>
                      <span class="v">${i.qty}</span>
                      <button onclick="BB_APP.cart.update('${i.id}', ${i.qty + 1}); render()">+</button>
                    </div>
                    <span class="remove" onclick="BB_APP.cart.remove('${i.id}'); render()">Remove</span>
                  </div>
                </div>
                <div class="price">
                  ${BB_APP.rupee(i.price * i.qty)}
                  <span class="mrp">₹${(i.mrp * i.qty).toLocaleString('en-IN')}</span>
                </div>
              </div>
            `).join("")}
          </div>

          <aside class="summary">
            <h2>Order summary</h2>
            <div class="row">
              <span>Subtotal · ${itemCount} item${itemCount !== 1 ? 's' : ''}</span>
              <span>${BB_APP.rupee(subtotal)}</span>
            </div>
            <div class="row">
              <span>Delivery</span>
              <span>${delivery === 0 ? '<span style="color: var(--ok); font-weight: 600">FREE</span>' : BB_APP.rupee(delivery)}</span>
            </div>
            <div class="coupon">
              <input placeholder="Coupon code"/>
              <button class="btn btn-ghost btn-sm">Apply</button>
            </div>
            <div class="row total">
              <span>Total</span>
              <span>${BB_APP.rupee(total)}</span>
            </div>
            ${freeNeed > 0
              ? `<div class="perk">🎁 Add <strong>₹${freeNeed.toLocaleString('en-IN')}</strong> more for free Bhind delivery</div>`
              : `<div class="perk ok">✓ You qualify for free Bhind delivery</div>`
            }
            <a class="btn btn-lg btn-block" style="margin-top: 14px;" href="checkout.html">
              Checkout · ${BB_APP.rupee(total)} →
            </a>
            <div style="text-align: center; font-size: 11px; color: var(--ink-3); margin-top: 14px;">
              🔒 Secure checkout · UPI, Cards, COD
            </div>
          </aside>
        </div>
      `;
    }

    render();
    window.addEventListener("bb:cart", render);
  </script>
</body>
</html>
