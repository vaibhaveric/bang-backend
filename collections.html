<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>All Collections — Bangali Sweets, Bhind</title>
  <meta name="description" content="Browse all collections at Bangali Sweets: mithai, namkeen, dry fruits, dairy, cake &amp; bakery, gift hampers, and birthday accessories."/>
  <link rel="canonical" href="https://bangalisweets.in/collections.html"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/site.css"/>
  <style>
    .page-head {
      padding: 48px 32px 32px;
      max-width: 1320px;
      margin: 0 auto;
    }
    .page-head h1 { font-size: clamp(40px, 6vw, 72px); margin: 12px 0 12px; }
    .collections-grid {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 32px 64px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }
    .col-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      aspect-ratio: 4/3;
      cursor: pointer;
      display: block;
    }
    .col-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .35s;
    }
    .col-card::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 30%, rgba(20,10,5,.78));
    }
    .col-card:hover img { transform: scale(1.04); }
    .col-card .lbl {
      position: absolute;
      left: 24px; right: 24px; bottom: 22px;
      color: #fff;
      z-index: 1;
    }
    .col-card .hi { font-family: var(--hindi); font-size: 16px; opacity: .88; }
    .col-card .en { font-family: var(--display); font-size: 32px; font-style: italic; line-height: 1; margin-top: 2px; }
    .col-card .desc { font-size: 13px; margin-top: 8px; opacity: .85; max-width: 320px; }
    .col-card .count {
      position: absolute; top: 18px; right: 18px;
      background: rgba(255,255,255,.95);
      color: var(--ink);
      font-size: 11px; font-weight: 600;
      padding: 5px 10px;
      border-radius: 99px;
      z-index: 1;
    }
    @media (max-width: 980px) {
      .collections-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    }
    @media (max-width: 540px) {
      .collections-grid { grid-template-columns: 1fr; padding: 0 16px 48px; }
      .col-card .en { font-size: 26px; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div class="page-head">
      <nav class="crumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep">›</span>
        <span class="curr">Collections</span>
      </nav>
      <div class="eyebrow" style="color: var(--gold)">Our kitchen</div>
      <h1 class="disp">Every collection, hand-made.</h1>
      <p class="muted" style="max-width: 600px; font-size: 16px; line-height: 1.65;">
        Seven categories of mithai, namkeen, dairy and dry fruits — all made fresh in our Pustak Bazar kitchen, sealed without preservatives, delivered same-day in Bhind and shipped pan-India.
      </p>
    </div>

    <div class="collections-grid" id="collections-grid"></div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>
  <script>
    BB_APP.mount();
    document.getElementById("collections-grid").innerHTML = BB.categories.map(c => `
      <a class="col-card" href="category.html?slug=${c.slug}">
        <img src="${c.hero}" alt="${c.en} collection"/>
        <span class="count">${c.items} items</span>
        <div class="lbl">
          <div class="hi">${c.hi}</div>
          <div class="en">${c.en}</div>
          <div class="desc">${c.desc}</div>
        </div>
      </a>
    `).join("");
  </script>
</body>
</html>
