<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title id="page-title">Category — Bangali Sweets</title>
  <meta id="page-desc" name="description" content="Browse the category at Bangali Sweets."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/site.css"/>
  <style>
    .cat-banner {
      position: relative;
      height: 320px;
      overflow: hidden;
      margin-top: 0;
    }
    .cat-banner img {
      width: 100%; height: 100%; object-fit: cover;
      filter: brightness(.62);
    }
    .cat-banner .inner {
      position: absolute;
      inset: 0;
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #fff;
    }
    .cat-banner .crumb { color: rgba(255,255,255,.78); padding: 0; margin-bottom: 12px; }
    .cat-banner .crumb a { color: rgba(255,255,255,.78); }
    .cat-banner .crumb .curr { color: #fff; }
    .cat-banner .hi { font-family: var(--hindi); font-size: 18px; color: var(--gold); }
    .cat-banner h1 { font-family: var(--display); font-size: clamp(48px, 7vw, 80px); margin: 4px 0; line-height: 1; }
    .cat-banner p { max-width: 600px; font-size: 15px; opacity: .9; margin: 4px 0 0; }

    .cat-body {
      max-width: 1320px;
      margin: 0 auto;
      padding: 36px 32px 64px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 36px;
    }

    .filters {
      position: sticky;
      top: calc(var(--header-h) + 16px);
      align-self: start;
    }
    .filters h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--ink-3);
      margin: 0 0 10px;
    }
    .filters .group {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--rule);
    }
    .filters label {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 0; font-size: 13px; cursor: pointer;
      color: var(--ink-2);
    }
    .filters label:hover { color: var(--ink); }
    .filters label input { accent-color: var(--accent); }
    .filters .count { margin-left: auto; font-size: 11px; color: var(--ink-3); }

    .grid-wrap {
      min-width: 0;
    }

    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar .count { font-size: 13px; color: var(--ink-3); }
    .toolbar .sort {
      padding: 8px 12px;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      background: var(--paper);
      font-size: 13px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .filters-mobile-toggle {
      display: none;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      background: var(--paper);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    @media (max-width: 980px) {
      .cat-body { grid-template-columns: 1fr; gap: 0; padding: 24px 24px 48px; }
      .filters { position: static; }
      .filters-mobile-toggle { display: block; }
      .filters[hidden] { display: none; }
      .filters { margin-bottom: 24px; }
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 540px) {
      .cat-banner { height: 240px; }
      .product-grid { gap: 12px; }
      .cat-body { padding: 18px 16px 48px; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="cat-banner" id="banner">
      <img id="banner-img" src="" alt=""/>
      <div class="inner">
        <nav class="crumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="sep">›</span>
          <a href="collections.html">Collections</a>
          <span class="sep">›</span>
          <span class="curr" id="crumb-name">Category</span>
        </nav>
        <div class="hi" id="cat-hi"></div>
        <h1 id="cat-en"></h1>
        <p id="cat-desc"></p>
      </div>
    </section>

    <div class="cat-body">
      <button class="filters-mobile-toggle" onclick="document.getElementById('filters').toggleAttribute('hidden')">Filter &amp; Sort ▾</button>

      <aside class="filters" id="filters">
        <div class="group">
          <h3>Price</h3>
          <label><input type="checkbox"/> Under ₹250 <span class="count">8</span></label>
          <label><input type="checkbox"/> ₹250 – ₹500 <span class="count">14</span></label>
          <label><input type="checkbox"/> ₹500 – ₹1000 <span class="count">9</span></label>
          <label><input type="checkbox"/> Over ₹1000 <span class="count">5</span></label>
        </div>
        <div class="group">
          <h3>Diet</h3>
          <label><input type="checkbox"/> Pure veg <span class="count">36</span></label>
          <label><input type="checkbox"/> Sugar-free <span class="count">3</span></label>
          <label><input type="checkbox"/> Eggless <span class="count">4</span></label>
        </div>
        <div class="group">
          <h3>Occasion</h3>
          <label><input type="checkbox"/> Diwali <span class="count">12</span></label>
          <label><input type="checkbox"/> Rakhi <span class="count">6</span></label>
          <label><input type="checkbox"/> Wedding <span class="count">8</span></label>
          <label><input type="checkbox"/> Corporate <span class="count">4</span></label>
        </div>
        <div>
          <h3>Availability</h3>
          <label><input type="checkbox"/> In stock <span class="count">34</span></label>
          <label><input type="checkbox"/> Pre-order <span class="count">2</span></label>
        </div>
      </aside>

      <div class="grid-wrap">
        <div class="toolbar">
          <span class="count" id="result-count"></span>
          <select class="sort" onchange="render(this.value)">
            <option value="featured">Sort: Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
            <option value="popular">Most Popular</option>
          </select>
        </div>
        <div class="product-grid" id="grid"></div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const slug = params.get("slug") || "sweets";
    const cat = BB_APP.find.category(slug) || BB.categories[0];
    let products = BB_APP.find.byCategory(cat.slug);

    document.title = `${cat.en} (${cat.hi}) — Bangali Sweets, Bhind`;
    document.getElementById("page-desc").setAttribute("content", `${cat.desc} Order online from Bangali Sweets, Bhind.`);

    BB_APP.mount({ nav: cat.slug });

    document.getElementById("banner-img").src = cat.hero;
    document.getElementById("banner-img").alt = cat.en;
    document.getElementById("crumb-name").textContent = cat.en;
    document.getElementById("cat-hi").textContent = cat.hi;
    document.getElementById("cat-en").textContent = cat.en;
    document.getElementById("cat-desc").textContent = cat.desc;
    document.getElementById("result-count").innerHTML = `<strong>${products.length}</strong> products`;

    function render(sort) {
      let list = [...products];
      if (sort === "price-asc") list.sort((a,b) => a.price - b.price);
      else if (sort === "price-desc") list.sort((a,b) => b.price - a.price);
      else if (sort === "rating") list.sort((a,b) => (b.rating||0) - (a.rating||0));
      else if (sort === "popular") list.sort((a,b) => (b.sold||b.reviews||0) - (a.sold||a.reviews||0));

      document.getElementById("grid").innerHTML = list.map(p => `
        <article class="product-card">
          <a href="product.html?id=${p.id}" class="img" aria-label="${p.en}">
            <img src="${p.img}" alt="${p.en} ${p.unit || ''}"/>
            ${p.tag ? `<span class="tag${p.tag === 'Bestseller' ? ' gold' : ''}">${p.tag}</span>` : ""}
          </a>
          <div class="body">
            <div class="hi">${p.hi}</div>
            <div class="nm"><a href="product.html?id=${p.id}">${p.en}</a></div>
            <div class="meta">${p.unit || p.pieces || ''} ${p.rating ? `· ★ ${p.rating}` : ''}</div>
            <div class="row">
              <span class="price">${BB_APP.rupee(p.price)} <span class="mrp">₹${p.mrp}</span></span>
              <button class="add" aria-label="Add ${p.en}" onclick="BB_APP.cart.add('${p.id}')">${BB_APP.icons.plus}</button>
            </div>
          </div>
        </article>
      `).join("");
    }
    render("featured");
  </script>
</body>
</html>
