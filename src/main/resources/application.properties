spring.datasource.url=jdbc:mysql://acela.proxy.rlwy.net:24158/bangali_sweets?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=XSmVIyQBBldlNyIrgSgOtJzGkJZvjJbP
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# ddl-auto=update → Hibernate auto-creates/updates all tables (schema) from the @Entity classes on startup.
# (Use `create` to drop & rebuild every boot, `validate` to only check; `update` is safe and preserves data.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server
server.port=8080
server.servlet.context-path=/api

# JWT
app.jwt.secret=BangaliSweetsSecretKeyForJWT2024MustBeAtLeast256BitsLong!@#
app.jwt.expiration-ms=604800000
app.jwt.admin-secret=AdminBangaliSweetsSecretKey2024MustBeAtLeast256BitsLong!@#

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Admin credentials (change in production)
app.admin.username=admin
app.admin.password=Bangali@2024

# CORS
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,file://

# Jackson — serialize LocalDateTime as ISO string, not array
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.in.bangalisweets=INFO
logging.level.org.springframework.security=WARN
